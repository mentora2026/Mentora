services:
  - type: web
    name: mentora-admin-dashboard
    runtime: static
    rootDir: admin-dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mentora-rv7y.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
