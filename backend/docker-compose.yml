version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: psych_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - localdb

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Use an externally provided DATABASE_URL if set (e.g. Supabase).
      # Fallback to the local `db` service when running with the
      # `--profile localdb` option:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://postgres:postgres@db:5432/psych_platform}
    ports:
      - "8000:8000"
    # When using an external database (Supabase, RDS, etc.) set
    # DATABASE_URL in `backend/.env` or in your environment before running.
    # To run a local Postgres alongside the backend, start compose with:
    #   docker compose --profile localdb up --build
    volumes:
      - .:/app

volumes:
  pgdata:
